name: Update PopAds Library
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-library:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch, extract, and commit PopAds libraries
        env:
          POPADS_INFO: ${{ secrets.POPADS_INFO }}
          POPADS_SITE: ${{ secrets.POPADS_SITE }}
          POPADS_FYI: ${{ secrets.POPADS_FYI }}
          POPADS_IO: ${{ secrets.POPADS_IO }}

          POPADS_NINJA_CC: ${{ secrets.POPADS_NINJA_CC }}
          POPADS_NINJA_SITE: ${{ secrets.POPADS_NINJA_SITE }}

          POPADS_KAMEHA: ${{ secrets.POPADS_KAMEHA }}
          
          POPADS_GETSU_SIMPLE: ${{ secrets.POPADS_GETSU_SIMPLE }}
          POPADS_GETSU_SPORTSEMBED: ${{ secrets.POPADS_GETSU_SPORTSEMBED }}
          POPADS_GETSU_ALPHA: ${{ secrets.POPADS_GETSU_ALPHA }}
          POPADS_GETSU_GOOZ: ${{ secrets.POPADS_GETSU_GOOZ }}
          POPADS_GETSU_NICK: ${{ secrets.POPADS_GETSU_NICK }}
          POPADS_GETSU_PLAY2: ${{ secrets.POPADS_GETSU_PLAY2 }}
          POPADS_GETSU_TOPEMBED: ${{ secrets.POPADS_GETSU_TOPEMBED }}

        run: |
          POPADS_VARS=(
            POPADS_INFO
            POPADS_SITE
            POPADS_FYI
            POPADS_IO
            POPADS_NINJA_CC
            POPADS_NINJA_SITE
            POPADS_KAMEHA
            POPADS_GETSU_SIMPLE
            POPADS_GETSU_SPORTSEMBED
            POPADS_GETSU_ALPHA
            POPADS_GETSU_GOOZ
            POPADS_GETSU_NICK
            POPADS_GETSU_PLAY2
            POPADS_GETSU_TOPEMBED
          )

          for var in "${POPADS_VARS[@]}"; do
            url="${!var}"
            [ -z "$url" ] && continue

            filename="$(echo "$var" | tr '[:upper:]' '[:lower:]')"

            echo "Processing $var → ${filename}.js"
            curl -f -o "${filename}_raw.js" "$url"
            perl -0777 -ne 'print $1 if /<script[^>]*>(.*?)<\/script>/s' "${filename}_raw.js" > "${filename}.js"
          done

          rm -f *_raw.js

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add popads_*.js
          git diff --staged --quiet || git commit -m "Update PopAds library"
          git push
